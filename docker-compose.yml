services:
  # ─── Database ───────────────────────────────────────────────────────────────
  sqlserver:
    build:
      context: .
      dockerfile: docker/db/Dockerfile
    restart: unless-stopped
    ports:
      - "${DB_PORT:-1433}:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${DB_PASSWORD}
      MSSQL_PID: Developer
      MSSQL_DB: ${DB_NAME:-ft_transcendence}
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P '${DB_PASSWORD}' -Q 'SELECT 1' -No || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 90s
    networks:
      - app_network

  # ─── Migrations + Seed (one-shot) ───────────────────────────────────────────
  migrate:
    build:
      context: .
      dockerfile: docker/migrate/Dockerfile
    restart: on-failure
    environment:
      DATABASE_URL: ${DATABASE_URL}
      HOST: sqlserver
      DB_PORT: ${DB_PORT:-1433}
      DB_NAME: ${DB_NAME:-ft_transcendence}
      DB_USER: ${DB_USER:-sa}
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - app_network

  # ─── Application ────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
      target: development
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      NODE_ENV: development

      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}

      HOST: sqlserver
      DB_PORT: ${DB_PORT:-1433}
      DB_NAME: ${DB_NAME:-ft_transcendence}
      DB_USER: ${DB_USER:-sa}
      DB_PASSWORD: ${DB_PASSWORD}

      DATABASE_URL: ${DATABASE_URL}

      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}

      RESET_PASSWORD_SECRET: ${RESET_PASSWORD_SECRET}
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - app_network

volumes:
  sqlserver_data:
    driver: local

networks:
  app_network:
    driver: bridge
