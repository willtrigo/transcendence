version: "3.9"

services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ft_sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Password123"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Password123' -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ft_sqlserver_init
    depends_on:
      sqlserver:
        condition: service_healthy
    volumes:
      - ./database:/database
      - ./docker/init-db.sh:/init-db.sh
    entrypoint: ["/bin/bash", "/init-db.sh"]

volumes:
  sqlserver_data: